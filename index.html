<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepCode Design - AI Multi-Agent Code Generation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    code { background: #f0f0f0; padding: 0.125rem 0.375rem; border-radius: 4px; font-size: 0.875em; }
    pre code { background: transparent; padding: 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #e5e7eb; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f9fafb; font-weight: 600; }
    .sidebar a:hover { background: #e5e7eb; }
    .content a { color: #0EA5E9; text-decoration: underline; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <aside class="sidebar w-64 bg-white border-r border-gray-200 flex flex-col">
    <div class="p-4 border-b border-gray-200">
      <h1 class="text-xl font-bold text-cyan-600">DeepCode Design</h1>
      <p class="text-sm text-gray-500 mt-1">AI Multi-Agent Code Generation</p>
    </div>
    <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="sidebar-nav">
      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Overview</div>
      <a href="#spec" data-file="SPEC.md" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-100">📄 SPEC.md</a>
      <a href="#readme" data-file="README.md" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-100">📑 README</a>
      
      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Architecture</div>
      <a href="#multi-agent" data-file="multi-agent-architecture.md" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-100">🤖 Multi-Agent</a>
      <a href="#provider" data-file="provider-architecture.md" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-100">🔌 Provider</a>
      <a href="#workflow" data-file="workflow-architecture.md" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-100">⚙️ Workflow</a>
      
      <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Data & State</div>
      <a href="#session" data-file="session-management.md" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-100">💾 Session</a>
      <a href="#tool" data-file="tool-system.md" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-100">🛠️ Tool System</a>
      <a href="#config" data-file="configuration.md" class="block px-3 py-2 rounded-lg text-sm hover:bg-gray-100">⚡ Configuration</a>
    </nav>
    <div class="p-4 border-t border-gray-200 text-xs text-gray-400">
      <a href="https://github.com/HKUDS/DeepCode" target="_blank" class="hover:text-cyan-600">GitHub</a> · 
      <a href="https://arxiv.org/abs/2512.07921" target="_blank" class="hover:text-cyan-600">Paper</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="content flex-1 overflow-y-auto">
    <div id="doc-content" class="max-w-4xl mx-auto p-8">
      <div class="text-center text-gray-400 mt-20">
        <p class="text-4xl mb-4">📄</p>
        <p>Select a document from the sidebar to view</p>
      </div>
    </div>
  </main>

  <script type="module" crossorigin src="assets/index.js"></script>
  <script>
    const docs = {
      'SPEC.md': `loading...`,
      'README.md': `loading...`,
      'multi-agent-architecture.md': `loading...`,
      'provider-architecture.md': `loading...`,
      'workflow-architecture.md': `loading...`,
      'session-management.md': `loading...`,
      'tool-system.md': `loading...`,
      'configuration.md': `loading...`,
    };
    
    const docMap = {
      'spec': 'SPEC.md',
      'readme': 'README.md',
      'multi-agent': 'multi-agent-architecture.md',
      'provider': 'provider-architecture.md',
      'workflow': 'workflow-architecture.md',
      'session': 'session-management.md',
      'tool': 'tool-system.md',
      'config': 'configuration.md'
    };

    async function loadDoc(filename) {
      const contentEl = document.getElementById('doc-content');
      contentEl.innerHTML = '<div class="text-center text-gray-400 mt-20"><p class="text-4xl mb-4">⏳</p><p>Loading...</p></div>';
      
      try {
        const response = await fetch(filename);
        if (!response.ok) throw new Error('Not found');
        const text = await response.text();
        contentEl.innerHTML = marked.parse(text);
        window.location.hash = Object.keys(docMap).find(k => docMap[k] === filename) || '';
      } catch (e) {
        contentEl.innerHTML = `<div class="text-center text-red-400 mt-20">
          <p class="text-4xl mb-4">❌</p>
          <p>Failed to load: ${filename}</p>
          <p class="text-sm mt-2">${e.message}</p>
        </div>`;
      }
    }

    // Load document on hash change
    window.addEventListener('hashchange', () => {
      const hash = window.location.hash.slice(1);
      if (hash && docMap[hash]) {
        loadDoc(docMap[hash]);
      }
    });

    // Load document on nav click
    document.querySelectorAll('#sidebar-nav a').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const file = link.dataset.file;
        if (file) loadDoc(file);
      });
    });

    // Load SPEC.md on initial
    loadDoc('SPEC.md');
  </script>
</body>
</html>
